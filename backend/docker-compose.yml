services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auratalk
      POSTGRES_PASSWORD: auratalk
      POSTGRES_DB: auratalk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auratalk -d auratalk"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  centrifugo:
    image: centrifugo/centrifugo:v5.4.9
    command:
      - centrifugo
      - --config=/centrifugo/config.json
    ports:
      - "8000:8000"
    volumes:
      - ./infra/centrifugo/config.json:/centrifugo/config.json:ro
    depends_on:
      redis:
        condition: service_healthy

  livekit:
    image: livekit/livekit-server:v1.13.1
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  # S3-compatible object storage for E2EE media blobs.
  # Local dev = MinIO. Production = Backblaze B2 (set S3_* in backend/.env).
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # One-shot: create the media bucket on first boot.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio'; sleep 2; done;
      /usr/bin/mc mb -p local/auratalk-media || true;
      /usr/bin/mc anonymous set none local/auratalk-media || true;
      echo 'minio bucket ready';
      exit 0;
      "

  gateway:
    build:
      context: .
      dockerfile: ./apps/gateway/Dockerfile
    environment:
      NODE_ENV: development
      SERVICE_NAME: gateway
      PORT: 8082
      LOG_LEVEL: info
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      CHAT_RELAY_SERVICE_URL: http://chat-relay-service:3003
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      chat-relay-service:
        condition: service_started
    ports:
      - "8082:8082"

  auth-service:
    build:
      context: .
      dockerfile: ./apps/auth-service/Dockerfile
    environment:
      NODE_ENV: development
      SERVICE_NAME: auth-service
      PORT: 3001
      LOG_LEVEL: info
      DATABASE_URL: postgres://auratalk:auratalk@postgres:5432/auratalk
      JWT_SECRET: change-me-change-me-change-me
      DEV_OTP_ENABLED: "true"
      DEV_OTP_CODE: "123456"
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: ./apps/user-service/Dockerfile
    environment:
      NODE_ENV: development
      SERVICE_NAME: user-service
      PORT: 3002
      LOG_LEVEL: info
      DATABASE_URL: postgres://auratalk:auratalk@postgres:5432/auratalk
      JWT_SECRET: change-me-change-me-change-me
      CENTRIFUGO_TOKEN_SECRET: dev-change-me
      CENTRIFUGO_API_URL: http://centrifugo:8000/api
      CENTRIFUGO_API_KEY: dev-change-me
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      LIVEKIT_URL: ws://10.0.2.2:7880
    depends_on:
      postgres:
        condition: service_healthy

  chat-relay-service:
    build:
      context: .
      dockerfile: ./apps/chat-relay-service/Dockerfile
    environment:
      NODE_ENV: development
      SERVICE_NAME: chat-relay-service
      PORT: 3003
      LOG_LEVEL: info
      DATABASE_URL: postgres://auratalk:auratalk@postgres:5432/auratalk
      JWT_SECRET: change-me-change-me-change-me
      CENTRIFUGO_API_URL: http://centrifugo:8000/api
      CENTRIFUGO_API_KEY: dev-change-me
      # S3-compatible media storage. Defaults to MinIO; override in backend/.env for B2.
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-005}
      S3_BUCKET: ${S3_BUCKET:-auratalk-media}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      MEDIA_MAX_BYTES: ${MEDIA_MAX_BYTES:-52428800}
    depends_on:
      postgres:
        condition: service_healthy
      centrifugo:
        condition: service_started
      minio:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:

