openapi: 3.0.3
info:
  title: AuraTalk Backend (Phase 1)
  version: 0.1.0
  description: |
    Consolidated OpenAPI spec for Phase 1 backend services.
    NOTE: This backend stores encrypted message envelopes only (no plaintext messages).

servers:
  - url: http://localhost:8082
    description: gateway (local)

tags:
  - name: auth
  - name: users
  - name: chat

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Ok:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
      required: [ok, error]

    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        service:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [ok, service, timestamp]

paths:
  /health:
    get:
      tags: [auth, users, chat]
      summary: Health check (per-service)
      description: |
        Each service exposes `/health` on its own port.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/request-otp:
    post:
      tags: [auth]
      summary: Request OTP (dev stub)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: "+919876543210"
              required: [phone]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"

  /auth/verify-otp:
    post:
      tags: [auth]
      summary: Verify OTP (dev OTP = 123456) and issue JWTs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                otp:
                  type: string
                deviceId:
                  type: string
              required: [phone, otp, deviceId]
      responses:
        "200":
          description: Tokens issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  userId:
                    type: string
                    format: uuid
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                required: [ok, userId, accessToken, refreshToken]
        "401":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: OTP provider not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required: [refreshToken]
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  accessToken:
                    type: string
                required: [ok, accessToken]
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me:
    get:
      tags: [users]
      summary: Get current user (JWT required)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      phone:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                    required: [id, phone, created_at]
                required: [ok, user]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/profile:
    post:
      tags: [users]
      summary: Update profile (JWT required)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  maxLength: 64
                avatarUrl:
                  type: string
                  format: uri
                  maxLength: 512
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /devices/keys:
    post:
      tags: [users]
      summary: Upsert device public keys (JWT required)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deviceId:
                  type: string
                identityKeyPublic:
                  type: string
                registrationId:
                  type: integer
                preKeyBundle:
                  type: object
                  additionalProperties: true
              required: [deviceId, identityKeyPublic, registrationId, preKeyBundle]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}/devices/keys:
    get:
      tags: [users]
      summary: Get device key bundles for a user (JWT required)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Device keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  devices:
                    type: array
                    items:
                      type: object
                      properties:
                        device_id:
                          type: string
                        identity_key_public:
                          type: string
                        registration_id:
                          type: integer
                        pre_key_bundle:
                          type: object
                          additionalProperties: true
                        updated_at:
                          type: string
                          format: date-time
                required: [ok, devices]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /messages:
    post:
      tags: [chat]
      summary: Send encrypted message envelope (JWT required)
      description: Server stores ciphertext only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversationId:
                  type: string
                recipientUserId:
                  type: string
                  format: uuid
                recipientDeviceId:
                  type: string
                ciphertext:
                  type: string
                clientMessageId:
                  type: string
              required: [conversationId, recipientUserId, recipientDeviceId, ciphertext]
      responses:
        "200":
          description: Stored envelope id
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  envelopeId:
                    type: string
                    format: uuid
                required: [ok, envelopeId]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations/{conversationId}/messages:
    get:
      tags: [chat]
      summary: Fetch encrypted envelopes for recipient device (JWT required)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Envelopes
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        conversation_id:
                          type: string
                        sender_user_id:
                          type: string
                          format: uuid
                        sender_device_id:
                          type: string
                        ciphertext:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        client_message_id:
                          type: string
                          nullable: true
                required: [ok, messages]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

