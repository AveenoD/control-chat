openapi: 3.0.3
info:
  title: AuraTalk Backend (Phase 1–2)
  version: 0.2.0
  description: |
    Consolidated OpenAPI spec for AuraTalk backend services.
    Phase 2 adds username identity, privacy settings, contacts, and message requests.
    NOTE: This backend stores encrypted message envelopes only (no plaintext messages).

servers:
  - url: http://localhost:8082
    description: gateway (local)

tags:
  - name: auth
  - name: users
  - name: contacts
  - name: message-requests
  - name: chat

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Ok:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
      required: [ok, error]

    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        service:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [ok, service, timestamp]

paths:
  /health:
    get:
      tags: [auth, users, chat]
      summary: Health check (per-service)
      description: |
        Each service exposes `/health` on its own port.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/request-otp:
    post:
      tags: [auth]
      summary: Request OTP (dev stub)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: "+919876543210"
              required: [phone]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"

  /auth/verify-otp:
    post:
      tags: [auth]
      summary: Verify OTP (dev OTP = 123456) and issue JWTs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                otp:
                  type: string
                deviceId:
                  type: string
              required: [phone, otp, deviceId]
      responses:
        "200":
          description: Tokens issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  userId:
                    type: string
                    format: uuid
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                required: [ok, userId, accessToken, refreshToken]
        "401":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: OTP provider not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required: [refreshToken]
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  accessToken:
                    type: string
                required: [ok, accessToken]
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me:
    get:
      tags: [users]
      summary: Get current user (JWT required)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      phone:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                    required: [id, phone, created_at]
                required: [ok, user]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/profile:
    post:
      tags: [users]
      summary: Update profile (JWT required)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  maxLength: 64
                avatarUrl:
                  type: string
                  format: uri
                  maxLength: 512
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /devices/keys:
    post:
      tags: [users]
      summary: Upsert device public keys (JWT required)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deviceId:
                  type: string
                identityKeyPublic:
                  type: string
                registrationId:
                  type: integer
                preKeyBundle:
                  type: object
                  additionalProperties: true
              required: [deviceId, identityKeyPublic, registrationId, preKeyBundle]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{userId}/devices/keys:
    get:
      tags: [users]
      summary: Get device key bundles for a user (JWT required)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Device keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  devices:
                    type: array
                    items:
                      type: object
                      properties:
                        device_id:
                          type: string
                        identity_key_public:
                          type: string
                        registration_id:
                          type: integer
                        pre_key_bundle:
                          type: object
                          additionalProperties: true
                        updated_at:
                          type: string
                          format: date-time
                required: [ok, devices]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /messages:
    post:
      tags: [chat]
      summary: Send encrypted message envelope (JWT required)
      description: Server stores ciphertext only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversationId:
                  type: string
                recipientUserId:
                  type: string
                  format: uuid
                recipientDeviceId:
                  type: string
                ciphertext:
                  type: string
                clientMessageId:
                  type: string
              required: [conversationId, recipientUserId, recipientDeviceId, ciphertext]
      responses:
        "200":
          description: Stored envelope id
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  envelopeId:
                    type: string
                    format: uuid
                required: [ok, envelopeId]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations/{conversationId}/messages:
    get:
      tags: [chat]
      summary: Fetch encrypted envelopes for recipient device (JWT required)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - in: query
          name: after
          required: false
          description: Return messages created after this envelope UUID (incremental sync)
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Envelopes
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        conversation_id:
                          type: string
                        sender_user_id:
                          type: string
                          format: uuid
                        sender_device_id:
                          type: string
                        ciphertext:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        client_message_id:
                          type: string
                          nullable: true
                required: [ok, messages]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations/{conversationId}/delivery:
    post:
      tags: [chat]
      summary: Delivery receipt — recipient device received message (ephemeral fan-out, no DB)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [envelopeId]
              properties:
                envelopeId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Delivery ack forwarded to sender via Centrifugo

  /conversations/{conversationId}/typing:
    post:
      tags: [chat]
      summary: Typing indicator (ephemeral fan-out, no DB)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isTyping]
              properties:
                isTyping:
                  type: boolean
      responses:
        "200":
          description: Typing event forwarded

  /conversations/{conversationId}/receipts:
    post:
      tags: [chat]
      summary: Read receipt — recipient opened chat (persisted + fan-out)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [envelopeId]
              properties:
                envelopeId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Read receipt stored and forwarded

  /conversations:
    get:
      tags: [chat]
      summary: List 1:1 conversations for current user (JWT required)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversation summaries with last message ciphertext

  /users/username/{username}/available:
    get:
      tags: [users]
      summary: Check if username is available (JWT required)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Availability result

  /users/by-username/{username}:
    get:
      tags: [users]
      summary: Public profile by username — no phone (JWT required)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
        "404":
          description: Not found

  /me/onboarding:
    post:
      tags: [users]
      summary: Complete onboarding with globally unique username (JWT required)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                displayName:
                  type: string
              required: [username, displayName]
      responses:
        "200":
          description: Onboarding complete
        "409":
          description: Username taken

  /me/privacy:
    get:
      tags: [users]
      summary: Get privacy settings (JWT required)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Privacy settings
    put:
      tags: [users]
      summary: Update privacy settings (JWT required)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: boolean
      responses:
        "200":
          description: Updated

  /contacts:
    get:
      tags: [contacts]
      summary: List saved contacts (JWT required)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Contact list
    post:
      tags: [contacts]
      summary: Add contact by userId or username (JWT required)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Contact added

  /contacts/{contactUserId}:
    delete:
      tags: [contacts]
      summary: Remove contact (JWT required)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: contactUserId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Removed

  /contacts/can-message/{targetUserId}:
    get:
      tags: [contacts]
      summary: Check direct-message permission (JWT required)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: targetUserId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: canMessage boolean

  /message-requests:
    post:
      tags: [message-requests]
      summary: Send message request to non-contact (JWT required)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Request created

  /message-requests/incoming:
    get:
      tags: [message-requests]
      summary: List incoming message requests (JWT required)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Request list

  /message-requests/{requestId}/accept:
    post:
      tags: [message-requests]
      summary: Accept message request (JWT required)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Accepted

  /message-requests/{requestId}/decline:
    post:
      tags: [message-requests]
      summary: Decline message request (JWT required)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Declined

